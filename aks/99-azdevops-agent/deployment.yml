apiVersion: apps/v1
kind: Deployment
metadata:
  name: azdevops-agent-deployment
  namespace: azdevops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azdevops-agent
  template:
    metadata:
      name: azdevops-agent-pod
      labels:
        app: azdevops-agent
    spec:
      containers:
        - name: azdevops-agent-container
          image: mcr.microsoft.com/azure-pipelines/vsts-agent:latest
          env:
          - name: VSTS_ACCOUNT
            valueFrom:
              secretKeyRef:
                name: azdevops-agent-secret
                key: VSTS_ACCOUNT
          - name: VSTS_TOKEN
            valueFrom:
              secretKeyRef:
                name: azdevops-agent-secret
                key: VSTS_TOKEN
          - name: VSTS_POOL
            valueFrom:
              secretKeyRef:
                name: azdevops-agent-secret
                key: VSTS_POOL
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: VSTS_AGENT
            value: "aks-agent-$(POD_NAME)"
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
