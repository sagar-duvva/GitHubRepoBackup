apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-nginxapp-deployment
  namespace: test
  labels:
    app: frontend-nginxapp
    tier: frontend

spec:
  replicas: 3

  selector:
    matchLabels:
      app: frontend-nginxapp

  template:
    metadata:
      labels:
        app: frontend-nginxapp
        tier: frontend

    spec:
      containers:
        - name: frontend-nginxapp-container
          image: stacksimplify/kube-frontend-nginx:1.0.0
          ports:
            - containerPort: 80
