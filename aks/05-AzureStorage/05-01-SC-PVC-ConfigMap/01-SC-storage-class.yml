apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: managed-premium-retain-sc
provisioner: kubernetes.io/azure-disk
reclaimPolicy: Retain  # Default is Delete, Retain
volumeBindingMode: WaitForFirstConsumer  # Default is Immediate, WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  storageaccountype: Premium_LRS  # Standard_LRS, Premium_LRS
  kind: managed  # Default is shared, Managed and Dedicated
